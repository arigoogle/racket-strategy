<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101216" />
      <stop offset="100%" stop-color="#06070a" />
    </linearGradient>
    <linearGradient id="court" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f7a64" />
      <stop offset="100%" stop-color="#0d3f33" />
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7af7c8" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#a16207" />
    </radialGradient>
  </defs>
  <!-- Full bleed background (no rounded corners — the OS will mask) -->
  <rect width="512" height="512" fill="url(#bg)" />
  <!-- Court scaled down to ~60% inside the 80% safe zone -->
  <g transform="translate(202 138)">
    <rect x="0" y="0" width="108" height="236" rx="6" ry="6" fill="url(#court)"
          stroke="url(#line)" stroke-width="4" />
    <line x1="0" y1="82" x2="108" y2="82" stroke="#f4f1e8" stroke-width="2" opacity="0.85" />
    <line x1="0" y1="154" x2="108" y2="154" stroke="#f4f1e8" stroke-width="2" opacity="0.85" />
    <line x1="0" y1="118" x2="108" y2="118" stroke="#0b0b0b" stroke-width="4" />
    <line x1="54" y1="82" x2="54" y2="118" stroke="#f4f1e8" stroke-width="2" opacity="0.85" />
    <line x1="54" y1="118" x2="54" y2="154" stroke="#f4f1e8" stroke-width="2" opacity="0.85" />
    <path d="M 14 18 L 96 218 L 14 218 Z" fill="#7af7c8" opacity="0.18" />
    <circle cx="14" cy="18" r="9" fill="url(#ball)" stroke="#fef9c3" stroke-width="1" />
  </g>
</svg>
